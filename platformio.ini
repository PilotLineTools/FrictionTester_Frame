; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32 @ 6.4.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.cpp_std = gnu++17
upload_speed = 115200
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv
upload_flags = 
	--before=default_reset
	--after=hard_reset
	--chip=esp32s3
	--baud=921600
monitor_speed = 115200
debug_tool = esp-builtin

; Enable native USB CDC on ESP32-S3 for USBSerial
; Module: ESP32-S3-WROOM-1-N4 (4MB flash, no PSRAM). Do not set BOARD_HAS_PSRAM.
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=3
	-std=gnu++17
	-DUSBSerial=Serial

; Local libs are in ./lib. These pull missing ones from registry if needed
lib_deps =
    madhephaestus/ESP32Servo @ ^1.1.2
    teemuatlut/TMCStepper @ ^0.7.3
    PaulStoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0

; Prefer local libraries in ./lib over registry versions when both exist
lib_ldf_mode = deep+
; Avoid pulling the registry Nextion lib; we use local Enhanced_Nextion
lib_ignore =
    Nextion
    itead/Nextion

; Board/module: ESP32-S3-DevKitC-1 with ESP32-S3-WROOM-1-N4 (4MB flash, no PSRAM)
